<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eleodoro Drink Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <!-- Branch Selection Overlay (Home) -->
    <div id="branch-selector" class="branch-selector-overlay">
        <div class="branch-home-content">
            <div class="home-banner">
                <!-- Logo overlaid on banner (Left) -->
                <img src="logo.jpg.jpeg" alt="Eleodoro Logo Left" class="overlay-logo">
                <!-- Logo overlaid on banner (Right) -->
                <img src="logo.jpg.jpeg" alt="Eleodoro Logo Right" class="overlay-logo right-logo">
                <!-- Using the video as the advertising banner -->
                <video src="video2.mp4.mp4" autoplay muted loop playsinline class="banner-video"></video>
            </div>
            
            <div class="home-selection">
                <div class="branch-buttons-container">
                    <button class="branch-btn kfc-style" onclick="selectBranch('Cerro Navia')">
                        <i class="fa-solid fa-store fa-2x"></i>
                        <span>SUCURSAL<br>CERRO NAVIA</span>
                    </button>
                    <button class="branch-btn kfc-style" onclick="selectBranch('Pudahuel Sur')">
                        <i class="fa-solid fa-store fa-2x"></i>
                        <span>SUCURSAL<br>PUDAHUEL SUR</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <header class="top-header">
        <div class="container header-container">
            <div class="logo">
                <img src="logo.jpg.jpeg" alt="Eleodoro el Grande" style="max-height: 60px;">
            </div>
            
            <div class="calendar-btn">
                <i class="fa-regular fa-calendar"></i>
                <span>Haz click aquí</span>
            </div>

            <div class="search-bar">
                <input type="text" placeholder="¿Qué producto buscas?...">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div class="user-actions">
                <div class="cart">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-count">0</span>
                    <span>Carro Compras</span>
                </div>
                <div class="user-profile">
                    <i class="fa-regular fa-user"></i>
                </div>
            </div>
        </div>
    </header>

    <nav class="main-nav">
        <div class="container nav-container">
            <a href="#" class="active">PROMOCIONES</a>
            <a href="#">PACKS</a>
            <a href="#">CERVEZA</a>
            <a href="#">PISCO</a>
            <a href="#">WHISKY</a>
            <a href="#">RON</a>
            <a href="#">VODKA</a>
            <a href="#">GIN</a>
            <a href="#">TEQUILA</a>
            <a href="#">LICORES</a>
            <a href="#">BEBIDAS</a>
            <a href="#">AGUA</a>
        </div>
    </nav>

    <main class="main-content container">
        
        <aside class="ad-box left-ad">
            <img src="imagen6.jpg" alt="Publicidad Heineken" style="width: 100%; height: 100%; object-fit: cover;">
        </aside>

        <section class="slider-section">
            <div class="slider-container">
                <div class="slider-track" id="sliderTrack">
                    <!-- Slide 1 (Video) -->
                    <div class="slide">
                        <video src="video1.mp4.mp4" autoplay muted loop playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
                    </div>
                    <!-- Slide 2 -->
                    <div class="slide">
                        <img src="slice1.jpg.jpg" alt="Slide 1 - Score" onerror="this.src='https://via.placeholder.com/800x400?text=Score+Energy+Drink'">
                    </div>
                    <!-- Slide 3 -->
                    <div class="slide">
                        <img src="slice2.jpg.jpg" alt="Slide 2 - Coca Cola" onerror="this.src='https://via.placeholder.com/800x400?text=Coca+Cola'">
                    </div>
                    <!-- Slide 4 -->
                    <div class="slide">
                        <img src="slice3.jpg.jpeg" alt="Slide 3 - Red Bull" onerror="this.src='https://via.placeholder.com/800x400?text=Red+Bull'">
                    </div>
                    <!-- Slide 5 -->
                    <div class="slide">
                        <img src="slice4.jpg.jpeg" alt="Slide 4 - Daniel Dhers" onerror="this.src='https://via.placeholder.com/800x400?text=Daniel+Dhers+Red+Bull'">
                    </div>
                </div>
                
                <button class="slider-btn prev" id="prevBtn"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="slider-btn next" id="nextBtn"><i class="fa-solid fa-chevron-right"></i></button>
                
                <div class="slider-dots" id="sliderDots">
                    <span class="dot active" data-index="0"></span>
                    <span class="dot" data-index="1"></span>
                    <span class="dot" data-index="2"></span>
                    <span class="dot" data-index="3"></span>
                    <span class="dot" data-index="4"></span>
                </div>
            </div>
        </section>

        <aside class="ad-box right-ad">
            <img src="imagen7.jpg" alt="Publicidad Sol" style="width: 100%; height: 100%; object-fit: cover;">
        </aside>

    </main>

    <a href="#" class="whatsapp-btn">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script src="script.js"></script>
</body>
</html>
